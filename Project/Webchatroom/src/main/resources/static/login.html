<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 网页聊天室</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; }
        .nav {
            width: 100%;
            height: 50px;
            background-color: #333;
            color: white;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 20px;
        }
        .login-container {
            width: 100%;
            height: calc(100vh - 50px);
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f0f0;
        }
        .login-dialog {
            width: 400px;
            padding: 30px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .login-dialog h3 {
            text-align: center;
            margin-bottom: 30px;
        }
        .login-dialog .row {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        .login-dialog .row span {
            width: 80px;
            font-weight: bold;
        }
        .login-dialog .row input {
            flex: 1;
            height: 35px;
            padding: 0 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
        }
        .login-dialog button {
            width: 100%;
            height: 40px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .login-dialog button:active {
            background-color: #45a049;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
        }
        .register-link a {
            color: #333;
            text-decoration: none;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="nav">网页聊天室</div>
<div class="login-container">
    <div class="login-dialog">
        <h3>登录</h3>
        <div class="row">
            <span>用户名</span>
            <input type="text" id="username" placeholder="请输入用户名">
        </div>
        <div class="row">
            <span>密码</span>
            <input type="password" id="password" placeholder="请输入密码">
        </div>
        <div class="row">
            <button id="submit">登录</button>
        </div>
        <div class="register-link">
            <a href="register.html">还没有账号？去注册</a>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $('#submit').click(function() {
        let username = $('#username').val().trim();
        let password = $('#password').val();

        if (!username || !password) {
            alert('请输入用户名和密码');
            return;
        }

        $.ajax({
            method: 'post',
            url: '/login',
            data: { username: username, password: password },
            success: function(data) {
                if (data && data.userId > 0) {
                    alert('登录成功！');
                    window.location.href = '/client.html';
                } else {
                    alert('登录失败！用户名或密码错误');
                }
            },
            error: function() {
                alert('登录失败！请检查网络');
            }
        });
    });
</script>
</body>
</html>
